name: Checks

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  lints:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  tests:
    runs-on: ubuntu-latest
    services:
      kafka:
        image: confluentinc/cp-kafka:8.2.1
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: DOCKER://0.0.0.0:29092,LOCALHOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: DOCKER://kafka:29092,LOCALHOST://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER:PLAINTEXT,LOCALHOST:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        ports:
          - 29092:29092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:29092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
        with:
            fetch-depth: 0

      # We run PostgreSQL as a step instead of a service because we originally
      # needed to configure it to support logical replication slots.
      # GitHub Actions services don't support overriding the container command,
      # only Docker runtime options via the 'options' field.
      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -e PGUSER=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            --health-cmd pg_isready \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:16.4 postgres

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 60 bash -c 'until docker exec postgres pg_isready; do sleep 1; done'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version-file: pyproject.toml

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        env:
          INVENTORY_DB_NAME: postgres
          INVENTORY_DB_HOST: localhost
          INVENTORY_DB_PORT: 5432
          INVENTORY_DB_USER: postgres
          INVENTORY_DB_PASS: postgres
          FLASK_APP: manage.py
          KAFKA_BOOTSTRAP_SERVERS: localhost:29092
        run: |
          uv run flask db upgrade
          uv run pytest --cov=. --cov-report=xml
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: ./coverage.xml
      #     fail_ci_if_error: true
      #     verbose: true
      #     flags: unittests
      #     name: codecov-umbrella
      #     token: ${{ secrets.CODECOV_TOKEN }}
