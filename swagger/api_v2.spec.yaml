        type: array
        items:
          type: string
    workspaceIdListParam:
      in: query
      name: workspace_id
      description: Filter by workspace ID (UUID format)
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/NonStrictUUID'
    viewId:
      in: path
      name: view_id
      description: View ID.
      required: true
