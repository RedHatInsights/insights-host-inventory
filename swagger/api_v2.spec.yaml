        advisories_rhba_applicable:
          type: integer
          minimum: 0
          nullable: true
        advisories_rhea_applicable:
          type: integer
          minimum: 0
          nullable: true
        advisories_other_applicable:
          type: integer
          minimum: 0
          nullable: true
        advisories_rhsa_installable:
          type: integer
          minimum: 0
          nullable: true
        advisories_rhba_installable:
          type: integer
          minimum: 0
          nullable: true
