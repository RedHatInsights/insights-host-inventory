    PatchHostIn:
      title: Host data
      description: >-
        Data of a single host to be updated via JSON Merge Patch (RFC 7396).
        Only the fields present in the request body are updated.
      type: object
      # IMPROVED: §7.4 — add constraints and additionalProperties: false
      additionalProperties: false
      properties:
        ansible_host:
          description: >-
            The ansible host name for remediations
          type: string
          example: host1.mydomain.com
          maxLength: 255
        display_name:
          description: >-
            A host's human-readable display name, e.g. in a form of a domain
            name.
          type: string
          example: host1.mydomain.com
          minLength: 1
          maxLength: 200

    # IMPROVED: §5.4 — explicit response schema for PATCH mutations
    PatchHostResponse:
      title: Patch Host Response
      description: Response after successfully patching one or more hosts.
      type: object
      properties:
        updated_count:
          description: Number of hosts that were updated.
          type: integer
          minimum: 0
        updated_ids:
          description: List of host IDs that were updated.
          type: array
          items:
            type: string
            format: uuid

    TimeStamp:
      type: string
      format: date-time
      example: '2020-02-10T08:07:03.354307+00:00'

    PerReporterStaleness:
      type: object
      properties:
        last_check_in:
          $ref: '#/components/schemas/TimeStamp'
        stale_timestamp:
          $ref: '#/components/schemas/TimeStamp'
        stale_warning_timestamp:
          $ref: '#/components/schemas/TimeStamp'
        culled_timestamp:
          $ref: '#/components/schemas/TimeStamp'
        check_in_succeeded:
          type: boolean
    GroupName:
      description: >-
        A group's human-readable name.
      type: string
      nullable: false
      example: sre-group
    NonStrictUUID:
      type: string
      pattern:
        ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$|^[0-9a-fA-F]{8}[0-9a-fA-F]{4}[0-9a-fA-F]{4}[0-9a-fA-F]{4}[0-9a-fA-F]{12}$
      format: uuid
      example: bA6deCFc19564430AB814bf8F70E8cEf
    SystemDefaultId:
      type: string
      enum:
        - system_default
      example: system_default
    GroupId:
      description: >-
        A durable and reliable platform-wide group identifier. Applications
        should use this identifier to reference groups.
      $ref: '#/components/schemas/NonStrictUUID'
    HostId:
      # IMPROVED: §5.8 — fixed description (was "group identifier", copy-paste error)
      description: >-
        A durable and reliable platform-wide host identifier. Applications
        should use this identifier to reference hosts.
      $ref: '#/components/schemas/NonStrictUUID'
    # IMPROVED: §8.3 — request body schema for POST /hosts/ids bulk lookup
    HostIdListRequest:
      title: Host ID List Request
      description: A list of host IDs to retrieve in bulk.
      type: object
      required:
        - ids
      properties:
        ids:
          description: List of host IDs to look up.
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/NonStrictUUID'

    HostIds:
      description: A comma-separated list of host IDs that belong to the group.
      type: array
      nullable: true
      # IMPROVED: §8.3 — add maxItems to prevent unbounded lists
      maxItems: 100
      items:
        $ref: '#/components/schemas/NonStrictUUID'
    StalenessId:
      description: Account Staleness UID
      oneOf:
        - $ref: '#/components/schemas/NonStrictUUID'
        - $ref: '#/components/schemas/SystemDefaultId'

    # IMPROVED: §5.9 — removed orphan ResourceTypesOut (no V2 endpoint returns it)
    # IMPROVED: §5.9 — removed orphan StalenessIn (no V2 staleness CRUD endpoint)

    StalenessTimeout:
      type: integer
      minimum: 1

    OrderHow:
      # IMPROVED: §10.4 — use enum instead of regex pattern
      type: string
      enum:
        - ASC
        - DESC
        - asc
        - desc

    # include renames for system_profile
    SystemProfile:
      $ref: 'system_profile.spec.yaml#/$defs/SystemProfile'
    SystemProfileNestedObject:
      $ref: 'system_profile.spec.yaml#/$defs/NestedObject'
    ViewColumnConfig:
      title: View Column Configuration
      description: Configuration for a single column in a view.
      type: object
      required:
        - key
      properties:
        key:
          description: >-
            The column key identifier, e.g. "insights_id",
            "compliance.last_scan", "advisor.recommendations".
          type: string
        visible:
          description: Whether the column is visible in the view.
          type: boolean
          default: true
    ViewSortConfig:
      title: View Sort Configuration
      description: Sort configuration for a view.
      type: object
      required:
        - key
      properties:
        key:
          description: The column key to sort by.
          type: string
        direction:
          description: The sort direction.
          type: string
          enum:
            - asc
            - desc
          default: desc
    ViewConfiguration:
      title: View Configuration
      description: >-
        The full visual configuration for an inventory view, including
        column layout, sort order, and active filters.
      type: object
      required:
        - columns
      properties:
        columns:
          description: Ordered list of column configurations.
          type: array
          items:
            $ref: '#/components/schemas/ViewColumnConfig'
        sort:
          $ref: '#/components/schemas/ViewSortConfig'
        filters:
          description: >-
            Active filter criteria. Keys are filter names, values are
            arrays of selected filter values.
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    ViewIn:
      title: View Create Payload
      description: Data required to create a new inventory view.
      type: object
      required:
        - name
        - configuration
      properties:
        name:
          description: The display name for the view.
          type: string
          minLength: 1
          maxLength: 255
        description:
          description: An optional description of the view.
          type: string
          maxLength: 2048
          nullable: true
        configuration:
          $ref: '#/components/schemas/ViewConfiguration'
        org_wide:
          description: >-
            If true, the view is visible to all users in the organization.
            If false, only the creator can see it.
          type: boolean
          default: false
    ViewPatch:
      title: View Update Payload
      description: Data for updating an existing inventory view. All fields are optional.
      type: object
      properties:
        name:
          description: The display name for the view.
          type: string
          minLength: 1
          maxLength: 255
        description:
          description: An optional description of the view.
          type: string
          maxLength: 2048
          nullable: true
        configuration:
          $ref: '#/components/schemas/ViewConfiguration'
        org_wide:
          description: >-
            If true, the view is visible to all users in the organization.
            If false, only the creator can see it.
          type: boolean
    ViewOut:
      title: View Response
      description: Full representation of an inventory view returned by the API.
      type: object
      properties:
        id:
          description: The unique identifier of the view.
          type: string
          format: uuid
        org_id:
          description: >-
            The organization ID that owns the view. Null for system views.
          type: string
          nullable: true
        name:
          description: The display name for the view.
          type: string
        description:
          description: An optional description of the view.
          type: string
          nullable: true
        configuration:
          $ref: '#/components/schemas/ViewConfiguration'
        org_wide:
          description: Whether the view is visible to the entire organization.
          type: boolean
        is_system_view:
          description: >-
            True if this is a read-only system view (Red Hat preset).
            System views cannot be updated or deleted, but can be cloned.
          type: boolean
        is_owner:
          description: >-
            True if the requesting user is the creator of this view.
            Only the owner can update or delete a view.
          type: boolean
        created_by:
          description: The username of the view creator.
          type: string
          nullable: true
        created_at:
          description: Timestamp when the view was created.
          type: string
          format: date-time
        updated_at:
          description: Timestamp when the view was last updated.
          type: string
          format: date-time
      required:
        - id
        - name
        - configuration
        - org_wide
        - is_system_view
        - is_owner
        - created_at
        - updated_at
    ViewsListOut:
      title: Views List Response
      description: A paginated list of inventory views.
      type: object
      allOf:
        - $ref: '#/components/schemas/PaginationOut'
        - type: object
          required:
            - results
          properties:
            results:
              description: List of inventory views.
              type: array
              items:
                $ref: '#/components/schemas/ViewOut'

    # include renames for pagination
    PaginationOut:
      $ref: 'pagination.yaml#/components/schemas/PaginationOut'
    Total:
      $ref: 'pagination.yaml#/components/schemas/Total'
    Count:
      $ref: 'pagination.yaml#/components/schemas/Count'
    Page:
      $ref: 'pagination.yaml#/components/schemas/Page'
    PerPage:
      $ref: 'pagination.yaml#/components/schemas/PerPage'
    # IMPROVED: §5.9 — removed orphan ResourceTypesPaginationOut (no V2 endpoint uses it)

    # IMPROVED: §6.1 — standardize error responses using RFC 7807 Problem Details
    ErrorResponse:
      title: Error Response (RFC 7807)
      description: >-
        A standardized error response following RFC 7807 Problem Details.
        All V2 error responses use this format.
      type: object
      properties:
        status:
          description: The HTTP status code.
          type: integer
        title:
          description: A short human-readable summary of the problem type.
          type: string
        detail:
          description: >-
            A human-readable explanation specific to this occurrence of the problem.
          type: string
        type:
          description: >-
            A URI reference that identifies the problem type. Defaults to "about:blank".
          type: string
          default: about:blank
      required:
        - status
        - title
        - detail

    NotFoundErrorResponse:
      title: Not Found Error Response
      description: Error response returned when one or more requested resources are not found.
      # IMPROVED: §6.1 — extends base ErrorResponse
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            not_found_ids:
              description: >-
                A list of IDs that were requested but not found. This field is included
                when specific IDs can be identified as missing.
              type: array
              items:
                type: string
                format: uuid
              example:
                - 22cd8e39-13bb-4d02-8316-84b850dc5136

    WorkspaceOut:
      title: Workspace Out Properties
      description: >-
        Data of a single workspace belonging to an account.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/GroupId"
        name:
          $ref: "#/components/schemas/GroupName"
        # IMPROVED: §3.7 — removed deprecated "account" field from WorkspaceOut
        org_id:
          $ref: "#/components/schemas/OrgId"
        ungrouped:
          description: Whether the group is the "ungrouped hosts" group
          type: boolean
        created:
          description: A timestamp when the entry was created.
          type: string
          format: date-time
        # IMPROVED: §5.5 — changed "modified" to "updated" to match code
        updated:
          description: A timestamp when the entry was last updated.
          type: string
          format: date-time
        parent_id:
          description: The parent workspace ID for hierarchical organization.
          type: string
          format: uuid
          nullable: true
        description:
          description: A free-text description of the workspace.
          type: string
          nullable: true
        type:
          description: The workspace classification type.
          type: string
          nullable: true
  responses:
    NotFoundError:
      description: One or more requested resources were not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundErrorResponse'
    # IMPROVED: §6.2 — typed 400 response (was bare "description" string)
    BadRequestError:
      description: Invalid request — validation failed or malformed input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    # IMPROVED: §6.5 — typed 403 response
    ForbiddenError:
      description: Forbidden — insufficient permissions or unsupported identity type.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    # IMPROVED: §6.3 — 409 Conflict response (e.g. duplicate resource names)
    ConflictError:
      description: Conflict — a resource with the same unique attributes already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    # IMPROVED: §6.4 — 503 Service Unavailable (used widely but never documented)
    ServiceUnavailableError:
      description: Service Unavailable — a downstream dependency is unreachable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
