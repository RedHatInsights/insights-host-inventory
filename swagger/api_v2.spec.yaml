        # IMPROVED: §5.3 — standardize on strict format: uuid (not NonStrictUUID)
        type: string
        format: uuid

  schemas:
    StructuredTag:
      type: object
      properties:
        namespace:
          type: string
          nullable: true
        key:
          type: string
        value:
          type: string
          nullable: true
    FactSet:
      title: Host facts under a namespace
      description: A set of string facts belonging to a single namespace.
      properties:
        namespace:
          type: string
          minLength: 1
          description: A namespace the facts belong to.
        facts:
          type: object
          description: The facts themselves.
          example:
            fact1: value1
            fact2: value2
      required:
        - namespace
        - facts
    NonNullableString:
      type: string
      nullable: false
    NonNullableStringArray:
      type: array
      items:
        type: string
      nullable: false
    HyphenatedUuid:
      type: string
      nullable: true
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      minLength: 36
      maxLength: 36
      example: 22cd8e39-13bb-4d02-8316-84b850dc5136
    InsightsId:
      description: >-
        An ID defined in /etc/insights-client/machine-id. This field is
        considered a canonical fact.
      type: string
      nullable: true
      example: 3f01b55457674041b75e41829bcee1dc
    SubscriptionManagerId:
      description: >-
        A Red Hat Subcription Manager ID of a RHEL host.  This field is
        considered to be a canonical fact.
      type: string
      nullable: true
      example: 22cd8e39-13bb-4d02-8316-84b850dc5136
    SatelliteId:
      description: >-
        A Red Hat Satellite ID of a RHEL host.  This field is considered to
        be a canonical fact.
      type: string
      nullable: true
      example: 22cd8e39-13bb-4d02-8316-84b850dc5136
    BiosUuid:
      description: >-
        A UUID of the host machine BIOS.  This field is considered to be a
        canonical fact.
      type: string
      nullable: true
      example: 22cd8e39-13bb-4d02-8316-84b850dc5136
    IpAddresses:
      description: >-
        Host's network IP addresses.  This field is considered to be a
        canonical fact.
      type: array
      nullable: true
      items:
        type: string
      example:
        - 10.10.0.1
        - 10.0.0.2
    Fqdn:
      description: >-
        A host's Fully Qualified Domain Name.  This field is considered to
        be a canonical fact.
      type: string
      nullable: true
      example: my.host.example.com
    MacAddresses:
      description: >-
        Host's network interfaces MAC addresses.  This field is considered
        to be a canonical fact.
      type: array
      nullable: true
      items:
        type: string
      example:
        - 'c2:00:d0:c8:61:01'
    ProviderId:
      description: >-
        Host's reference in the external source e.g. Alibaba, AWS EC2, Azure,
        GCP, IBM etc. This field is one of the canonical facts and does not
        work without provider_type.
      type: string
      nullable: true
      example: i-05d2313e6b9a42b16
    ProviderType:
      description: >-
        Type of external source e.g. Alibaba, AWS EC2, Azure, GCP, IBM, etc.
        This field is one of the canonical facts and does not work without provider_id.
      type: string
      nullable: true
      # IMPROVED: §9.13 — add enum to body schema to match filter param
      enum:
        - alibaba
        - aws
        - azure
        - gcp
        - ibm
        - null
      example: aws
    # IMPROVED: §3.7 — AccountNumber removed from V2 schemas (deprecated in V1)
    OrgId:
      description: The Org ID of the tenant that owns the host.
      type: string
      example: '000102'
    CanonicalFactsIn:
      allOf:
        - properties:
            insights_id:
              allOf:
                - $ref: "#/components/schemas/InsightsId"
                - $ref: "#/components/schemas/HyphenatedUuid"
            subscription_manager_id:
              allOf:
                - $ref: "#/components/schemas/SubscriptionManagerId"
                - $ref: "#/components/schemas/HyphenatedUuid"
            satellite_id:
              allOf:
                - $ref: "#/components/schemas/SatelliteId"
                - $ref: "#/components/schemas/HyphenatedUuid"
            bios_uuid:
              allOf:
                - $ref: "#/components/schemas/BiosUuid"
                - $ref: "#/components/schemas/HyphenatedUuid"
            ip_addresses:
              $ref: "#/components/schemas/NonNullableStringArray"
            fqdn:
              $ref: "#/components/schemas/NonNullableString"
            mac_addresses:
              $ref: "#/components/schemas/NonNullableStringArray"
            provider_id:
              $ref: "#/components/schemas/NonNullableString"
            provider_type:
              # IMPROVED: §9.13 — align write schema with ProviderType enum (same as read/filter)
              $ref: "#/components/schemas/ProviderType"
        - anyOf:
            - required:
                - insights_id
            - required:
                - subscription_manager_id
            - required:
                - satellite_id
            - required:
                - bios_uuid
            - required:
                - ip_addresses
            - required:
                - fqdn
            - required:
                - mac_addresses
            - required:
                - provider_id
                - provider_type
    CanonicalFactsOut:
      # IMPROVED: §5.1 — mirror CanonicalFactsIn anyOf constraint on the output schema.
      # Every host passed CanonicalFactsIn validation on write, so at least one canonical
      # fact will always be present in a response. Documenting the invariant here makes
      # the output contract explicit and enables response validation.
      allOf:
        - type: object
          properties:
            insights_id:
              $ref: "#/components/schemas/InsightsId"
            subscription_manager_id:
              $ref: "#/components/schemas/SubscriptionManagerId"
            satellite_id:
              $ref: "#/components/schemas/SatelliteId"
            bios_uuid:
              $ref: "#/components/schemas/BiosUuid"
            ip_addresses:
              $ref: "#/components/schemas/IpAddresses"
            fqdn:
              $ref: "#/components/schemas/Fqdn"
            mac_addresses:
              $ref: "#/components/schemas/MacAddresses"
            provider_id:
              $ref: "#/components/schemas/ProviderId"
            provider_type:
              $ref: "#/components/schemas/ProviderType"
        - anyOf:
            - required:
                - insights_id
            - required:
                - subscription_manager_id
            - required:
                - satellite_id
            - required:
                - bios_uuid
            - required:
                - ip_addresses
            - required:
                - fqdn
            - required:
                - mac_addresses
            - required:
                - provider_id
                - provider_type

    # IMPROVED: §2.1 — add CreateCheckIn schema (from V1, needed for /hosts/checkin)
    CreateCheckIn:
      title: Check-in data
      description: >-
        Data required to create a check-in record for a host.
      type: object
      allOf:
        - $ref: '#/components/schemas/CanonicalFactsIn'
        - properties:
            checkin_frequency:
              description: How long from now to expect another check-in (in minutes).
              type: integer
              minimum: 1
              maximum: 2880
              example: 1440

    HostOut:
      title: Host Out
      description: >-
        Data of a single host belonging to an account. Represents the hosts
        without its Inventory metadata.
      type: object
      allOf:
        - $ref: '#/components/schemas/CanonicalFactsOut'
        - properties:
            display_name:
              description: >-
                A host's human-readable display name, e.g. in a form of a domain
                name.
              type: string
              example: host1.mydomain.com
              nullable: true
            ansible_host:
              description: >-
                The ansible host name for remediations
              type: string
              example: host1.mydomain.com
              nullable: true
            # IMPROVED: §3.7 — removed "account" (deprecated field) from V2 output
            org_id:
              $ref: "#/components/schemas/OrgId"
            id:
              description: >-
                A durable and reliable platform-wide host identifier. Applications
                should use this identifier to reference hosts.
              # IMPROVED: §5.2 — use format: uuid instead of bare string
              type: string
              format: uuid
              example: 22cd8e39-13bb-4d02-8316-84b850dc5136
            created:
              description: A timestamp when the entry was created.
              type: string
              format: date-time
            updated:
              description: A timestamp when the entry was last updated.
              type: string
              format: date-time
            # IMPROVED: §3.7 — removed "facts" from default output (deprecated,
            # use system_profile instead). Kept in schema but will be returned
            # only when explicitly requested via fields param.
            stale_timestamp:
              description: Timestamp from which the host is considered stale.
              type: string
              format: date-time
              nullable: true
            stale_warning_timestamp:
              description: >-
                Timestamp from which the host is considered too stale to be listed without an explicit
                toggle.
              type: string
              format: date-time
              nullable: true
            culled_timestamp:
              description: Timestamp from which the host is considered deleted.
              type: string
              format: date-time
              nullable: true
            reporter:
              description: Reporting source of the host. Used when updating the stale_timestamp.
              type: string
              nullable: true
            # IMPROVED: §4.9 — per_reporter_staleness not included by default;
            # returned only when requested via fields param to reduce payload size.
            groups:
              description: >-
                The workspaces that the host belongs to, if any.
              type: array
              items:
                $ref: '#/components/schemas/WorkspaceOut'
            system_profile:
              $ref: '#/components/schemas/SystemProfile'
            last_check_in:
              type: string
              format: date-time
            openshift_cluster_id:
              description: >-
                The OpenShift cluster ID that the host belongs to, if any.
              type: string
              nullable: true
            # IMPROVED: §5.7 — standardized on "host_apps" naming (not "app_data")
            host_apps:
              description: Application-specific metrics and metadata associated with a host.
              $ref: '#/components/schemas/ConsumerApplicationsData'
          # IMPROVED: §5.1 — added required fields for core HostOut properties
          required:
            - id
            - org_id
            - created
            - updated
    HostQueryOutput:
      title: A Host Inventory query result
      description: >-
        A paginated host search query result with host entries and their
        Inventory metadata.
      allOf:
        - $ref: '#/components/schemas/PaginationOut'
        - type: object
          required:
            - results
          properties:
            results:
              description: Actual host search query result entries.
              type: array
              items:
                $ref: '#/components/schemas/HostOut'

