# NOTE: Using OpenAPI 3.0.0 because Connexion 3.3 (our routing framework) does not
# support OpenAPI 3.1 or 3.2. See https://github.com/spec-first/connexion/issues/1396
#
# IMPROVED V2 SPEC — incorporates findings from V1_API_Comprehensive_TechDebt.html.
# Every change is annotated with "# IMPROVED: §X.Y — description" so the diff against
# swagger/api_v2.spec.yaml is self-documenting.
openapi: 3.0.0
info:
  description: REST interface for the Insights Platform Host Inventory application.
  version: 2.0.0
  title: Insights Host Inventory V2 REST Interface
servers:
  - url: /api/inventory/v2
    description: V2 API server
externalDocs:
  description: How to use the Red Hat Insights API
  url: https://docs.redhat.com/en/documentation/red_hat_insights/1-latest/html/using_the_red_hat_insights_api/index
paths:
  /hosts:
    get:
      operationId: api.v2.host.get_host_list
      tags:
        - hosts
      summary: Read the entire list of hosts
      description: >-
        Read the entire list of all hosts available to the account.
        <br /><br />
        Required permissions: inventory:hosts:read
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/displayName'
        - $ref: '#/components/parameters/fqdn'
        - $ref: '#/components/parameters/hostnameOrId'
        - $ref: '#/components/parameters/insightsId'
        - $ref: '#/components/parameters/subscriptionManagerId'
        - $ref: '#/components/parameters/providerId'
        - $ref: '#/components/parameters/providerType'
        - $ref: '#/components/parameters/updatedStart'
        - $ref: '#/components/parameters/updatedEnd'
        - $ref: '#/components/parameters/lastCheckInStart'
        - $ref: '#/components/parameters/lastCheckInEnd'
        - $ref: '#/components/parameters/workspaceNameListParam'
        - $ref: '#/components/parameters/workspaceIdListParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/hostOrderByParam'
        - $ref: '#/components/parameters/hostOrderHowParam'
        - $ref: '#/components/parameters/stalenessParam'
        - $ref: '#/components/parameters/tagsParam'
        - $ref: '#/components/parameters/registered_with'
        - $ref: '#/components/parameters/systemTypeParam'
        # IMPROVED: §2.3 — wire combined filter/fields so GET /hosts can filter and
        # select both system_profile AND app-data fields in one query.
        - $ref: '#/components/parameters/combinedFilterParam'
        - $ref: '#/components/parameters/combinedFieldsParam'
      responses:
        '200':
          description: Successfully read the hosts list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostQueryOutput'
        # IMPROVED: §6.2 — add typed 400 response schema
        '400':
          $ref: '#/components/responses/BadRequestError'
    delete:
      operationId: api.v2.host.delete_hosts_by_filter
      tags:
        - hosts
      summary: Delete the entire list of hosts filtered by the given parameters
      description: >-
        Delete the entire list of hosts filtered by the given parameters.
        <br /><br />
        Required permissions: inventory:hosts:write
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/displayName'
        - $ref: '#/components/parameters/fqdn'
        - $ref: '#/components/parameters/hostnameOrId'
        - $ref: '#/components/parameters/insightsId'
        - $ref: '#/components/parameters/providerId'
        - $ref: '#/components/parameters/providerType'
        - $ref: '#/components/parameters/updatedStart'
        - $ref: '#/components/parameters/updatedEnd'
        - $ref: '#/components/parameters/lastCheckInStart'
        - $ref: '#/components/parameters/lastCheckInEnd'
        - $ref: '#/components/parameters/workspaceNameListParam'
        - $ref: '#/components/parameters/workspaceIdListParam'
        - $ref: '#/components/parameters/registered_with'
        - $ref: '#/components/parameters/systemTypeParam'
        - $ref: '#/components/parameters/stalenessNoDefaultsParam'
        - $ref: '#/components/parameters/tagsParam'
        - $ref: '#/components/parameters/combinedFilterParam'   # IMPROVED: §2.3
        - $ref: '#/components/parameters/subscriptionManagerId'
      responses:
        # IMPROVED: §8.1 — changed from 202 to 204; hosts are deleted synchronously
        # before the response is sent, so 202 (async acceptance) was misleading.
        '204':
          description: Successfully deleted the filtered hosts.
        # IMPROVED: §6.2 — add typed 400 response schema
        '400':
          $ref: '#/components/responses/BadRequestError'
  /hosts/all:
    delete:
      operationId: api.v2.host.delete_all_hosts
      tags:
        - hosts
      summary: Delete all hosts on the account
      description: >-
        Delete all hosts on the account.  The request must include "confirm_delete_all=true".
        <br /><br />
        Required permissions: inventory:hosts:write
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/confirmDeleteAll'
      responses:
        '202':
          description: Request for deleting all hosts has been accepted.
        # IMPROVED: §6.2 — add typed 400 response schema
        '400':
          $ref: '#/components/responses/BadRequestError'

  # IMPROVED: §2.1 — add POST /hosts/checkin (missing from original V2 spec)
  /hosts/checkin:
    post:
      operationId: api.v2.host.host_checkin
      tags:
        - hosts
      summary: Update staleness timestamps for a host matching the provided facts
      description: >-
        Finds a host and updates its staleness timestamps.
        It uses the supplied canonical facts to determine which host to update.
        By default, the staleness timestamp is set to 1 hour from when the request is received;
        however, this can be overridden by supplying the interval.
        <br /><br />
        Required permissions: inventory:hosts:write
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        description: Data required to create a check-in record for a host.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckIn'
      responses:
        '201':
          description: Successfully checked in host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostOut'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # IMPROVED: §8.3 — add POST /hosts/ids for bulk lookups beyond the 20-ID path limit.
  # GET /hosts/{host_id_list} is capped at maxItems: 20 due to URL length constraints.
  # Clients needing to look up more than 20 hosts by ID must use this endpoint instead.
  /hosts/ids:
    post:
      operationId: api.v2.host.get_hosts_by_id_list
      tags:
        - hosts
      summary: Find hosts by a list of IDs (bulk)
      description: >-
        Accepts a JSON body containing a list of host IDs and returns the matching hosts.
        Use this endpoint instead of GET /hosts/{host_id_list} when looking up more than
        20 hosts at a time. Supports the same pagination, ordering, and field selection
        as GET /hosts/{host_id_list}.
        <br /><br />
        Required permissions: inventory:hosts:read
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/hostOrderByParam'
        - $ref: '#/components/parameters/hostOrderHowParam'
        - $ref: '#/components/parameters/combinedFieldsParam'
      requestBody:
        description: List of host IDs to retrieve.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HostIdListRequest'
      responses:
        '200':
          description: Successfully retrieved hosts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostQueryOutput'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  '/hosts/{host_id_list}':
    get:
      tags:
        - hosts
      summary: Find hosts by their IDs
      description: >-
        Find one or more hosts by their ID.
        <br /><br />
        Required permissions: inventory:hosts:read
      operationId: api.v2.host.get_host_by_id
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/hostIdList'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/hostOrderByParam'
        - $ref: '#/components/parameters/hostOrderHowParam'
        # IMPROVED: §2.3 — use combined fields instead of system_profile-only fields
        - $ref: '#/components/parameters/combinedFieldsParam'
      responses:
        '200':
          description: Successfully searched for hosts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostQueryOutput'
        '400':
          $ref: '#/components/responses/BadRequestError'   # IMPROVED: §6.2
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - hosts
      summary: Delete hosts by IDs
      description: >-
        Delete hosts by IDs
        <br /><br />
        Required permissions: inventory:hosts:write
      operationId: api.v2.host.delete_host_by_id
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/hostIdList'
      responses:
        # IMPROVED: §8.1 — standardize DELETE to 204 No Content
        '204':
          description: Successfully deleted hosts.
        '400':
          $ref: '#/components/responses/BadRequestError'   # IMPROVED: §6.2
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - hosts
      summary: Update hosts
      description: >-
        Update hosts. This endpoint applies a JSON Merge Patch (RFC 7396) to the
        specified hosts. Only the fields present in the request body are updated;
        absent fields are left unchanged.
        <br /><br />
        Required permissions: inventory:hosts:write
      operationId: api.v2.host.patch_host_by_id
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/hostIdList'
      requestBody:
        description: A group of fields to be updated on the hosts
        required: true
        content:
          # IMPROVED: §8.2 — document PATCH as Merge Patch (RFC 7396)
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/PatchHostIn'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchHostIn'
      responses:
        '200':
          description: Successfully updated the hosts.
          content:
            application/json:
              schema:
                # IMPROVED: §5.4 — define explicit mutation response instead of bare
                # "type: object" with no properties
                $ref: '#/components/schemas/PatchHostResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'   # IMPROVED: §6.2
        '404':
          $ref: '#/components/responses/NotFoundError'

  # IMPROVED: §2.1 — add GET /hosts/{host_id_list}/system_profile (missing from V2)
  '/hosts/{host_id_list}/system_profile':
    get:
      tags:
        - hosts
      summary: Return one or more hosts system profile
      description: >-
        Find one or more hosts by their ID and return the id and system profile.
        <br /><br />
        Required permissions: inventory:hosts:read
      operationId: api.v2.host.get_host_system_profile_by_id
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/hostIdList'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/hostOrderByParam'
        - $ref: '#/components/parameters/hostOrderHowParam'
        # IMPROVED: §2.1 — no branchId (RHINENG-14001), use combined fields
        - $ref: '#/components/parameters/combinedFieldsParam'
      responses:
        '200':
          description: Successfully searched for hosts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemProfileByHostOut'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /host-views:
    get:
      operationId: api.v2.views.get_views_list
      tags:
        - host-views
      summary: Read the list of inventory views
      description: >-
        Read the list of all inventory views visible to the requesting user. This includes system views, org-wide views, and
        private views owned by the requester. <br /><br /> Required permissions: inventory:views:read
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
      responses:
        '200':
          description: Successfully read the views list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewsListOut'
        # IMPROVED: §6.5 — add typed 403 response schema
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      operationId: api.v2.views.create_view
      tags:
        - host-views
      summary: Create a new inventory view
      description: >-
        Creates a new inventory view with the provided name and configuration. The view is owned by the requesting user. <br
        /><br /> Required permissions: inventory:views:write
      security:
        - ApiKeyAuth: []
      requestBody:
        description: Data required to create a new inventory view.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewIn'
      responses:
        '201':
          description: Successfully created the inventory view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewOut'
        '400':
          $ref: '#/components/responses/BadRequestError'   # IMPROVED: §6.2
        '403':
          $ref: '#/components/responses/ForbiddenError'    # IMPROVED: §6.5
        # IMPROVED: §6.3 — add 409 for duplicate view name
        '409':
          $ref: '#/components/responses/ConflictError'
  /host-views/{view_id}:
    get:
      operationId: api.v2.views.get_view_by_id
      tags:
        - host-views
      summary: Get a single inventory view
      description: >-
        Returns the full details and configuration for a single inventory view. The view must be visible to the requesting
        user. <br /><br /> Required permissions: inventory:views:read
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/viewId'
      responses:
        '200':
          description: Successfully returned the inventory view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewOut'
        '403':
          $ref: '#/components/responses/ForbiddenError'    # IMPROVED: §6.5
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      operationId: api.v2.views.update_view
      tags:
        - host-views
      summary: Update an inventory view
      description: >-
        Updates an existing inventory view's name, description, configuration, or sharing settings. Only the view creator
        can update a view. System views cannot be updated. <br /><br /> Required permissions: inventory:views:write
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/viewId'
      requestBody:
        description: Data with which to update the inventory view.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewPatch'
      responses:
        '200':
          description: Successfully updated the inventory view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewOut'
        '400':
          $ref: '#/components/responses/BadRequestError'   # IMPROVED: §6.2
        '403':
          $ref: '#/components/responses/ForbiddenError'    # IMPROVED: §6.5
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      operationId: api.v2.views.delete_view
      tags:
        - host-views
      summary: Delete an inventory view
      description: >-
        Deletes an existing inventory view. Only the view creator can delete a view. System views cannot be deleted. <br /><br
        /> Required permissions: inventory:views:write
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/viewId'
      responses:
        '204':
          description: Successfully deleted the inventory view.
        '403':
          $ref: '#/components/responses/ForbiddenError'    # IMPROVED: §6.5
        '404':
          $ref: '#/components/responses/NotFoundError'
  /host-views/{view_id}/clone:
    post:
      operationId: api.v2.views.clone_view
      tags:
        - host-views
      summary: Clone an inventory view
      description: >-
        Creates a copy of any visible view (including system views) as a new private view owned by the requesting user. The
        cloned view name is prefixed with "Copy of ". <br /><br /> Required permissions: inventory:views:write
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/viewId'
      responses:
        '201':
          description: Successfully cloned the inventory view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewOut'
        '403':
          $ref: '#/components/responses/ForbiddenError'    # IMPROVED: §6.5
        '404':
          $ref: '#/components/responses/NotFoundError'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      x-bearerInfoFunc: app.auth.bearer_token_handler
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-rh-identity
      description: >-
        Base64-encoded JSON identity header provided by 3Scale. Contains an
        org_id of the user issuing the request. Format of the JSON:
        {"identity": {"org_id": "12345678"}}
      x-apikeyInfoFunc: app.auth.authentication_header_handler
  parameters:
    pageParam:
      $ref: 'pagination.yaml#/components/parameters/pageParam'
    perPageParam:
      $ref: 'pagination.yaml#/components/parameters/perPageParam'
    # IMPROVED: §5.9 — removed orphan resourceTypesPerPageParam (no V2 endpoint uses it)
    hostIdList:
      in: path
      name: host_id_list
      description: A comma-separated list of host IDs.
      required: true
      schema:
        type: array
        # IMPROVED: §8.3 — add maxItems to prevent unbounded path lists
        maxItems: 20
        items:
          $ref: '#/components/schemas/NonStrictUUID'
    displayName:
      in: query
      name: display_name
      schema:
        type: string
      description: Filter by display_name (case-insensitive)
      required: false
    fqdn:
      in: query
      name: fqdn
      schema:
        type: string
      description: Filter by FQDN (case-insensitive)
      required: false
    hostnameOrId:
      in: query
      name: hostname_or_id
      schema:
        type: string
      description: Filter by display_name, fqdn, id (case-insensitive)
      required: false
    insightsId:
      in: query
      name: insights_id
      schema:
        type: string
        format: uuid
      # IMPROVED: §2.6 — document the sentinel value for "no insights_id"
      description: >-
        Filter by insights_id. The sentinel value 00000000-0000-0000-0000-000000000000
        matches hosts that have no insights_id set.
      required: false
    subscriptionManagerId:
      in: query
      name: subscription_manager_id
      schema:
        type: string
        format: uuid
      description: Filter by subscription_manager_id
      required: false
    providerId:
      in: query
      name: provider_id
      schema:
        type: string
      description: Filter by provider_id
      required: false
    providerType:
      in: query
      name: provider_type
      schema:
        # IMPROVED: §9.13 — align filter enum with body schema (ProviderType)
        type: string
        enum:
          - alibaba
          - aws
          - azure
          - gcp
          - ibm
          # IMPROVED: §9.12 — removed "discovery" which is a reporter, not a provider
      description: Filter by provider_type
      required: false
    updatedStart:
      in: query
      name: updated_start
      schema:
        type: string
        format: date-time
      description: >-
        Only show hosts last modified after the given date (ISO 8601 date-time).
        Dates with a year of 1970 or earlier are silently ignored — no filter is
        applied and all hosts are returned. Use a date after 1970 to filter
        meaningfully.
    updatedEnd:
      in: query
      name: updated_end
      schema:
        type: string
        format: date-time
      description: >-
        Only show hosts last modified before the given date (ISO 8601 date-time).
        Dates with a year of 1970 or earlier are silently ignored — no filter is
        applied and all hosts are returned. Use a date after 1970 to filter
        meaningfully.
    lastCheckInStart:
      in: query
      name: last_check_in_start
      schema:
        type: string
        format: date-time
      description: >-
        Only show hosts last checked in after the given date (ISO 8601 date-time).
        Dates with a year of 1970 or earlier are silently ignored — no filter is
        applied and all hosts are returned. Use a date after 1970 to filter
        meaningfully.
    lastCheckInEnd:
      in: query
      name: last_check_in_end
      schema:
        type: string
        format: date-time
      description: >-
        Only show hosts last checked in before the given date (ISO 8601 date-time).
        Dates with a year of 1970 or earlier are silently ignored — no filter is
        applied and all hosts are returned. Use a date after 1970 to filter
        meaningfully.
    hostOrderByParam:
      name: order_by
      in: query
      required: false
      schema:
        type: string
        enum:
          - display_name
          - workspace_name
          - updated
          - operating_system
          - last_check_in
          # IMPROVED: §2.3 — add app-metric sort values for host-views-style queries
          - advisor.recommendations
          - advisor.incidents
          - vulnerability.total_cves
          - vulnerability.critical_cves
          - patch.advisories_rhsa_applicable
          - compliance.policies_count
      description: >-
        Ordering field name. App-metric sort fields (e.g. advisor.recommendations)
        are available when host_apps data is included.
    hostOrderHowParam:
      in: query
      name: order_how
      required: false
      schema:
        # IMPROVED: §10.4 — use enum instead of regex pattern for OrderHow
        $ref: '#/components/schemas/OrderHow'
      description: >-
        Direction of the ordering; defaults to ASC for display_name, and to DESC
        for updated and operating_system
    stalenessParam:
      name: staleness
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - fresh
            - stale
            - stale_warning
            # IMPROVED: §9.1 — "unknown" explicitly removed (RHINENG-5893)
        default:
          - fresh
          - stale
          - stale_warning
      description: "Culling states of the hosts. Default: fresh, stale and stale_warning"
    stalenessNoDefaultsParam:
      name: staleness
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - fresh
            - stale
            - stale_warning
      description: "Culling states of the hosts."
    tagsParam:
      name: tags
      in: query
      description: 'Filters systems by tag(s). Specify multiple tags as a comma-separated list (e.g. insights-client/security=strict,env/type=prod).'
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^([^=/]+/)?(?!.*/=)[^=]+(=[^=/]+)?$'
    registered_with:
      in: query
      name: registered_with
      required: false
      description: >-
        Filters out any host not registered by the specified reporters.
        Prefix a value with "!" to exclude hosts from that reporter.
        <br /><br />
        <b>Alias:</b> `yupana` is a legacy alias that expands at runtime to both
        `satellite` and `discovery`. Passing `registered_with=yupana` is equivalent
        to filtering on hosts registered by either `satellite` or `discovery`.
      schema:
        type: array
        items:
          type: string
          enum:
            # IMPROVED: RHINENG-4846 — removed "insights" from allowed values
            - yupana
            - satellite
            - discovery
            - puptoo
            - rhsm-conduit
            - cloud-connector
            - "!yupana"
            - "!satellite"
            - "!discovery"
            - "!puptoo"
            - "!rhsm-conduit"
            - "!cloud-connector"
    systemTypeParam:
      in: query
      name: system_type
      required: false
      description: Filters systems by type
      schema:
        type: array
        items:
          type: string
          enum:
            - conventional
            - bootc
            - edge
            - cluster
    # IMPROVED: §2.3 — new combined filter param replaces filter_param for V2
    # Supports both system_profile AND app-data filtering in a single query param.
    combinedFilterParam:
      in: query
      name: filter
      required: false
      description: >-
        Filters hosts based on system_profile fields and/or application data metrics.
        <br /><br />
        <b>System profile filter examples:</b>
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;{"system_profile": {"workloads": {"sap": {"sap_system": {"eq": "true"}}}}}
        <br /><br />
        which equates to the URL param:
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;"?filter[system_profile][sap_system][eq]=true"
        <br /><br />
        To filter by operating system:
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;{"system_profile": {"operating_system": {"name": {"eq": "rhel"}}}}
        <br /><br />
        which equates to the URL param:
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;"?filter[system_profile][operating_system][name][eq]=rhel"
        <br /><br />
        <b>Application data filter examples:</b>
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;{"advisor": {"recommendations": {"gt": "5"}}}
        <br /><br />
        which equates to the URL param:
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;"?filter[advisor][recommendations][gt]=5"
        <br /><br />
        <b>Null checks:</b>
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;{"vulnerability": {"total_cves": {"nil": true}}}
        <br /><br />
        Note: the nil/not_nil operators use boolean values (true/false), not strings.
      style: deepObject
      explode: true
      example: {}
      schema:
        $ref: '#/components/schemas/HostViewCombinedFilter'
    # IMPROVED: §2.3 — new combined fields param replaces fields_param for V2
    combinedFieldsParam:
      in: query
      name: fields
      required: false
      description: >-
        Selects which system_profile and/or application data fields to include in the
        response. When omitted, no system_profile is returned but all app_data is
        returned by default.
        <br /><br />
        <b>Syntax:</b> `fields[sub_object]=field1,field2`
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;"?fields[system_profile]=arch,host_type"
        <br /><br />
        &nbsp;&nbsp;&nbsp;&nbsp;"?fields[advisor]=recommendations,incidents"
        <br /><br />
        <b>Deviation from JSON:API sparse fieldsets (https://jsonapi.org/format/#fetching-sparse-fieldsets):</b>
        <br /><br />
        HBI's `fields` parameter borrows the `fields[TYPE]=field1,field2` URL syntax from
        JSON:API but deviates in the following ways (tracked in RHINENG-11389):
        <br /><br />
        1. The `TYPE` key is a <b>sub-object name</b> (`system_profile`, `advisor`, `patch`,
        etc.), not the JSON:API resource type. In strict JSON:API the resource type here
        would be `hosts`.
        <br /><br />
        2. <b>Top-level host fields are not selectable.</b> Fields such as `id`,
        `display_name`, `org_id`, and `created` are always present in the response
        regardless of this parameter.
        <br /><br />
        3. `fields[app]=true` returns <b>all fields</b> for that application. This value
        is not part of JSON:API; the spec has no equivalent shorthand.
        <br /><br />
        4. `fields[app]=` (empty value) returns <b>no fields</b> for that application —
        the key will be present in the response as an empty object `{}`.
        <br /><br />
        5. `fields[app_data]=true` is an HBI-specific meta-key that requests all fields
        for all application data apps. It is not a JSON:API concept.
        <br /><br />
        6. Unknown or unrecognised TYPE keys are <b>silently ignored</b>. No error is
        returned for `fields[nonexistent_app]=foo`.
      style: deepObject
      explode: true
      x-validator: sparseFields
      example: {}
      schema:
        $ref: '#/components/schemas/HostViewCombinedFields'
    confirmDeleteAll:
      in: query
      name: confirm_delete_all
      schema:
        type: boolean
      description: Confirmation to delete all hosts on the account
      required: false
    workspaceNameListParam:
